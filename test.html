<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Chatbot Clone - Optimisé pour le Codage</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/code-styles.css">
    <!-- Highlight.js theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* Custom styles for code-focused UI */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Ensure Fira Code is used for code blocks */
        code, pre, .hljs {
            font-family: 'Fira Code', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace !important;
        }
        
        /* Dark theme by default for coding */
        :root {
            --color-bg-primary: #1e1e1e;
            --color-bg-secondary: #2d2d2d;
            --color-bg-tertiary: #3a3a3a;
            --color-text-primary: #f5f5f5;
            --color-text-secondary: #a1a1aa;
            --color-text-tertiary: #71717a;
            --color-border: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v12M2 12h12M22 12h-12M12 22V12"/>
                    </svg>
                    <span>Nouveau chat</span>
                </button>
            </div>
            
            <div class="sidebar-search">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Rechercher dans les conversations...">
                <button class="clear-search-btn" id="clearSearchBtn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div class="chat-history" id="chatHistory"></div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="user-details">
                        <div class="user-name">Utilisateur</div>
                        <div class="user-status">En ligne</div>
                    </div>
                </div>
                <button class="settings-btn" id="settingsBtn" aria-label="Paramètres">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </aside>
        
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
        </button>
        
        <!-- Main Chat Area -->
        <main class="main-chat" id="mainChat">
            <div class="chat-container">
                <!-- Chat Header -->
                <header class="chat-header">
                    <div class="chat-title">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <input type="text" class="chat-title-input" id="chatTitleInput" placeholder="Nouveau chat" readonly>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn copy-chat-btn" id="copyChatBtn" aria-label="Copier le chat">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 1c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2H4zm12 0h-8v2h8V1z"/>
                            </svg>
                        </button>
                        <button class="chat-action-btn share-chat-btn" id="shareChatBtn" aria-label="Partager">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="18" cy="5" r="3"/>
                                <circle cx="6" cy="12" r="3"/>
                                <circle cx="18" cy="19" r="3"/>
                                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                            </svg>
                        </button>
                        <button class="chat-action-btn delete-chat-btn" id="deleteChatBtn" aria-label="Supprimer">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                        </button>
                        <button class="chat-action-btn close-chat-btn mobile-only" id="closeChatBtn" aria-label="Fermer">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 6L6 18M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </header>
                
                <!-- Messages Area -->
                <div class="messages" id="messages">
                    <!-- Welcome Message -->
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-logo">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                        </div>
                        <h1>Bienvenue dans ton Chatbot IA pour Développeurs</h1>
                        <p>Commence une conversation pour obtenir de l'aide avec ton code, des explications, ou des exemples.</p>
                        <div class="quick-prompts">
                            <button class="quick-prompt" data-prompt="Explique-moi comment fonctionne cette fonction JavaScript: function add(a, b) { return a + b; }">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                </svg>
                                <span>Expliquer du code</span>
                            </button>
                            <button class="quick-prompt" data-prompt="Corrige ce code JavaScript: function sum(arr) { let total; for (let i = 0; i < arr.length; i++) { total += arr[i]; } return total; }">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                <span>Corriger du code</span>
                            </button>
                            <button class="quick-prompt" data-prompt="Génère un exemple de code pour un API REST en Node.js avec Express">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                                <span>Générer du code</span>
                            </button>
                            <button class="quick-prompt" data-prompt="Quelles sont les meilleures pratiques pour le code JavaScript moderne?">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                </svg>
                                <span>Meilleures pratiques</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea 
                            id="messageInput" 
                            placeholder="Écris un message ou colle du code... (Ctrl+K pour un nouveau chat)"
                            rows="1"
                            autofocus
                        ></textarea>
                        <button class="stop-btn" id="stopBtn" style="display: none;" aria-label="Arrêter">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>
                        <button class="send-btn" id="sendBtn" aria-label="Envoyer">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-info">
                        <span id="modelInfo">Modèle: mistral-tiny</span>
                        <span id="tokenCount">0 / 32000 jetons</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Paramètres</h2>
                <button class="close-btn" id="closeSettingsBtn" aria-label="Fermer">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3>Paramètres API</h3>
                    <div class="form-group">
                        <label for="apiProvider">Fournisseur</label>
                        <select id="apiProvider">
                            <option value="mistral">Mistral AI</option>
                            <option value="openai">OpenAI</option>
                            <option value="groq">Groq</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="apiUrl">URL de l'API</label>
                        <input type="text" id="apiUrl" placeholder="https://api.mistral.ai/v1/chat/completions">
                    </div>
                    <div class="form-group password-input">
                        <label for="apiKey">Clé API</label>
                        <input type="password" id="apiKey" placeholder="Votre clé API">
                        <button class="toggle-password" id="togglePassword" aria-label="Montrer/Cacher">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-group">
                        <label for="apiModel">Modèle</label>
                        <select id="apiModel">
                            <option value="mistral-tiny">mistral-tiny</option>
                        </select>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>Paramètres de l'IA</h3>
                    <div class="form-group">
                        <label for="temperature">Température: <span id="temperatureValue">0.7</span></label>
                        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                    </div>
                    <div class="form-group">
                        <label for="maxTokens">Jetons maximum</label>
                        <input type="number" id="maxTokens" value="32000" min="1">
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>Apparence</h3>
                    <div class="form-group">
                        <label for="theme">Thème</label>
                        <select id="theme">
                            <option value="system">Système</option>
                            <option value="light">Clair</option>
                            <option value="dark">Sombre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fontSize">Taille de la police</label>
                        <select id="fontSize">
                            <option value="small">Petite</option>
                            <option value="medium" selected>Moyenne</option>
                            <option value="large">Grande</option>
                        </select>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h3>Options</h3>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="enableStreaming" checked>
                            <span class="checkmark"></span>
                            <span>Activer le streaming</span>
                        </label>
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="saveHistory" checked>
                            <span class="checkmark"></span>
                            <span>Sauvegarder l'historique</span>
                        </label>
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="enterToSend">
                            <span class="checkmark"></span>
                            <span>Envoyer avec Entrée (sinon Shift+Entrée)</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSettingsBtn">Annuler</button>
                <button class="btn btn-primary" id="saveSettingsBtn">Enregistrer</button>
            </div>
        </div>
    </div>
    
    <!-- Share Modal -->
    <div class="modal-overlay" id="shareModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Partager</h2>
                <button class="close-btn" id="closeShareBtn" aria-label="Fermer">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <button class="share-option" id="copyLinkBtn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <span>Copier le lien</span>
                    </button>
                    <button class="share-option" id="exportJsonBtn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10,9 9,9 8,9"/>
                        </svg>
                        <span>Exporter en JSON</span>
                    </button>
                    <button class="share-option" id="exportHtmlBtn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10,9 9,9 8,9"/>
                        </svg>
                        <span>Exporter en HTML</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <svg class="loading-logo spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path class="path" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        </svg>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- Scripts -->
    <script type="module">
        // Import and initialize the app
        import { ChatApp } from './scripts/classes/ChatApp.js';
        window.chatApp = new ChatApp();
    </script>
    
    <!-- Highlight.js for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // Register additional languages
        hljs.registerLanguage('javascript', require('highlight.js/lib/languages/javascript'));
        hljs.registerLanguage('python', require('highlight.js/lib/languages/python'));
        hljs.registerLanguage('html', require('highlight.js/lib/languages/xml'));
        hljs.registerLanguage('css', require('highlight.js/lib/languages/css'));
        hljs.registerLanguage('bash', require('highlight.js/lib/languages/bash'));
        hljs.registerLanguage('json', require('highlight.js/lib/languages/json'));
    </script>
</body>
</html>
