<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fsdfsdbs Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-theme" onload="initMedia()">
    <div class="custom-cursor"></div>

    <div id="start-screen">
        <div id="start-text"></div>
    </div>

    <div class="container">
        <video id="background" autoplay loop muted playsinline webkit-playsinline></video>

        <div id="hacker-overlay" class="hidden"></div>
        <div id="snow-overlay" class="hidden"></div>
        <div class="glitch-overlay"></div>

        <audio id="background-music"></audio>
        <audio id="hacker-music"></audio>
        <audio id="rain-music"></audio>
        <audio id="anime-music"></audio>
        <audio id="car-music"></audio>

        <div id="profile-block">
            <div class="profile-header">
                <div class="profile-container">
                    <img src="assets/profile.gif" alt="Profile" class="profile-picture">
                </div>
                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name"></div>
                        <div class="badge-group">
                            <div class="badge-container">
                                <img src="assets/developer.png" alt="Developer" class="badge">
                                <div class="badge-back">Developer</div>
                            </div>
                            <div class="badge-container">
                                <img src="assets/verified.gif" alt="Verified" class="badge">
                                <div class="badge-back">Verified</div>
                            </div>
                            <div class="badge-container">
                                <img src="assets/partner.gif" alt="Partner" class="badge">
                                <div class="badge-back">Partner</div>
                            </div>
                        </div>
                    </div>
                    <div id="profile-bio"></div>
                </div>
            </div>

            <div class="bio-separator"></div>

            <div class="profile-footer">
                <div class="social-links">
                    <a href="https://github.com/fsdfsdbs" target="_blank">
                        <img src="assets/github.png" alt="GitHub" class="social-icon">
                    </a>
                    <a href="https://discord.gg/motiongoats" target="_blank">
                        <img src="assets/discord.png" alt="Discord" class="social-icon">
                    </a>
                    <a href="https://youtube.com" target="_blank">
                        <img src="assets/youtube.png" alt="YouTube" class="social-icon">
                    </a>
                    <a href="https://tiktok.com" target="_blank">
                        <img src="assets/tiktok.png" alt="TikTok" class="social-icon">
                    </a>
                </div>

                <div class="visitor-counter">
                    <svg class="visitor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <span id="visitor-count">921234</span>
                </div>
            </div>
        </div>

        <div id="skills-block" class="hidden">
            <h2 class="skills-title">Skills</h2>
            <div class="skill">
                <div class="skill-name">
                    <span>Python</span>
                    <span>87%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="python-bar" class="skill-bar"></div>
                </div>
            </div>
            <div class="skill">
                <div class="skill-name">
                    <span>C++</span>
                    <span>75%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="cpp-bar" class="skill-bar"></div>
                </div>
            </div>
            <div class="skill">
                <div class="skill-name">
                    <span>C#</span>
                    <span>80%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="csharp-bar" class="skill-bar"></div>
                </div>
            </div>
        </div>

        <div id="results-button-container" class="hidden">
            <button id="results-theme">View Results</button>
            <div id="results-hint" class="hidden">Click to return to profile</div>
        </div>

        <div class="controls">
            <div id="home-theme" class="theme-button">1</div>
            <div id="hacker-theme" class="theme-button">2</div>
            <div id="rain-theme" class="theme-button">3</div>
            <div id="anime-theme" class="theme-button">4</div>
            <div id="car-theme" class="theme-button">5</div>
        </div>

        <div class="top-controls">
            <svg class="volume-icon" id="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707l-4.707-4.707z"></path>
            </svg>
            <input type="range" min="0" max="1" step="0.01" value="0.3" class="volume-slider" id="volume-slider">
            
            <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 3v18M3 12h18"></path>
            </svg>
            <input type="range" min="0" max="1" step="0.01" value="0.7" class="transparency-slider" id="transparency-slider">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
